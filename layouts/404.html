<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found – {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #121212; /* Dark background */
      color: #e0e0e0;           /* Light text */
      text-align: center;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 8rem;
      margin: 0;
      color: #ff6b6b; /* Accent color */
      animation: pop 0.6s ease-out;
    }

    p {
      font-size: 1.25rem;
      margin: 1rem 0 2rem;
      color: #cccccc;
    }

    a.button {
      font-weight: 500;
      background-color: #007acc;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #005fa3;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Oops! The page you’re looking for doesn’t exist.</p>
  <a class="button" href="{{ "/" | relLangURL }}">← Back to Home</a>
</body>
</html>
